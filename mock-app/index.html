<!doctype html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocomplete Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .form-container { max-width: 640px; }
    input, button { font: inherit; padding: 0.65rem; }
    input { width: 100%; box-sizing: border-box; margin-top: 0.5rem; }
    .suggestions { list-style: none; padding: 0; border: 1px solid #ccc; }
    .suggestions li { padding: 0.6rem; cursor: pointer; }
    .suggestions li:hover { background: #eee; }
    #next-button { margin-top: 1rem; }
    .error-message { display: none; margin-left: 1rem; }
    .success-container { display: none; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Autocomplete Form</h1>
    <label for="input-field">Enter a value:</label>
    <input type="text" id="input-field" placeholder="Type here..." autocomplete="off">
    <ul class="suggestions" role="listbox" aria-label="Suggestions"></ul>
    <button id="next-button" type="button">Next</button>
    <span class="error-message" role="alert">Error: Invalid input. Please select a valid suggestion.</span>
    <div class="success-container" role="status">
      <p>Success! Your response has been recorded.</p>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
